sub_shift_name: |
  {% if form_name == "Оформление путёвки в ДОЛ \"Бауманец\" 1 смена 2026" %}1{% else %}2{% endif %}

sub_shift_start_date: |
  {% if sub_shift_name == "1" %}05{% else %}03{% endif %}

sub_shift_end_date: |
  {% if sub_shift_name == "1" %}26 июня{% else %}24 июля{% endif %}

sub_shift_start_date_full: |
  {% if sub_shift_name == "1" %}05 июня{% else %}03 июля{% endif %} 2026 г.

sub_shift_end_date_full: |
  {% if sub_shift_name == "1" %}26 июня{% else %}24 июля{% endif %} 2026 г.

sub_parent_work_place_and_job_title: |
  {{ parent_work_place }}, {{ parent_job_title }}

sub_parent_passport: |
  {{ parent_passport_sernum }}, выдан {{ parent_passport_issue }}

sub_parent_home_address_or_empty_string: |
  {{ parent_home_address or "" }}

sub_child_child_birth_certificate: |
  {{ child_birth_certificate_ser }} {{ child_birth_certificate_num }}, выдан {{ child_birth_certificate_issue_date }} {{ child_birth_certificate_issuer }}

sub_child_child_birth_certificate_or_passport: |
  {% if child_has_passport %}{{ child_passport_sername }}, выдан {{ child_passport_issue }}{% else %}{{ sub_child_child_birth_certificate }}{% endif %}

minio_archive_name: "{{sub_shift_name}} смена - {{ parent_name }} - {{ child_name }}.{{ created_dt }}.zip"

mail_to:         "{{ parent_email }}"
mail_from_alias: "Детский оздоровительный лагерь \"Бауманец\""
mail_from_mail:  "ucbaumanec@bmstu.ru"
mail_subject:    "Документы для оплаты путёвки ДОЛ \"Бауманец\" {{ child_name }} {{ sub_shift_name }} смена 2026"
mail_text: |
  Здравствуйте, {{ parent_name }}!
  <br/>
  <br/>
  Высылаем Вам автоматически заполненные документы для оформления путёвки в ДОЛ "Бауманец": <strong>{{ child_name }} {{ sub_shift_name }} смена 2026</strong>.
  <br/>
  <br/>
  ⚠️ Стоимость путёвки на одну смену в 2026 году составляет 81 700 рублей.
  <br/>
  <br/>
  ❗️ <strong>Пожалуйста, проверьте документы внимательно! Если Вы заметите ошибку, заполните форму повторно</strong>
  <br/>
  <br/>
  💬 <strong>Чтобы назначить день и время встречи для приобретения путёвки, заполните короткую форму:</strong><br/>
  {% if sub_shift_name == "1" -%}
  👉 <a href="https://formdesigner.ru/form/244064-dol-baumanec-2026-1.html">Записаться на приём</a>
  {% else -%}
  👉 <a href="https://formdesigner.ru/form/244531-dol-baumanec-2026-2.html">Записаться на приём</a>
  {% endif -%}
  <br/>
  <br/>
  <br/>
  ❗️ <strong>Внимание! Продажа путёвок строго в указанные даты:</strong><br/>
  🔹 1 смена – только с 1 по 12 апреля 2026 года<br/>
  🔹 2 смена – только с 15 по 26 апреля 2026 года
  <br/>
  <br/>
  <strong>⛔ Вне этих сроков приобрести путёвку невозможно!</strong>
  <br/>
  <br/>
  📑 Подготовьте документы согласно памятке (PDF-файл приложен к письму). <strong>Распечатайте только те, которые указаны в списке.</strong>
  <br/>
  <br/>
  Если у вас есть вопросы, звоните или пишите – будем рады помочь!
  <br/>
  <br/>
  С уважением, <br/>
  Администрация ДОЛ «Бауманец» <br/>
  ucbaumanec@bmstu.ru